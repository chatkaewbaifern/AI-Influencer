<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <style>
    /* loopText off: text/decorations render statically. */
    .underline { transform-origin: left center; }
  </style>
  <defs>
    <linearGradient id="hdr-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d10"/>
      <stop offset="100%" stop-color="#0d0d10" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#hdr-bg)" rx="14" ry="14"/>

  <!-- Corner decorations: outer <g> = position, inner <g> = animation -->
  <g class="corner" opacity="0.6">
    <rect x="40" y="42" width="22" height="2" fill="#dc2626" />
    <rect x="40" y="42" width="2" height="22" fill="#dc2626" />
  </g>
  <g transform="translate(800 0) scale(-1 1)">
    <g class="corner" opacity="0.6">
      <rect x="40" y="42" width="22" height="2" fill="#dc2626" />
      <rect x="40" y="42" width="2" height="22" fill="#dc2626" />
    </g>
  </g>

  <!-- Name -->
  <text class="name" x="400" y="138" text-anchor="middle" fill="#f7f7fb" font-family='"Inter", system-ui, sans-serif' font-size="56" font-weight="700" letter-spacing="-1.5">AI Influence</text>

  <!-- Accent underline -->
  <rect class="underline" x="232" y="164" width="336" height="2" fill="#dc2626" rx="1"/>

  <!-- Meta line -->
  <text class="meta" x="400" y="200" text-anchor="middle" fill="#a5a5b3" font-family="ui-monospace, monospace" font-size="13" letter-spacing="2">AI ADVERTISING &amp; VIRTUAL AVATAR STUDIO</text>
</svg>